name: Product Experience Quality Check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/engagement-quality.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Check backend syntax
        run: |
          node --check server/start.js
          node --check server/routes/engagementPreload.js
          node --check server/routes/gymBattlesPreload.js
          node --check server/routes/entityCompatPreload.js

      - name: Lint changed product files
        run: >-
          npx eslint
          src/App.jsx
          src/api/engagementClient.js
          src/api/gymBattleClient.js
          src/components/auth/AnimatedOtpVerification.jsx
          src/components/auth/AuthExperienceShell.jsx
          src/components/se7enfit/BottomNav.jsx
          src/components/se7enfit/TopBar.jsx
          src/pages/Login.jsx
          src/pages/Register.jsx
          src/pages/ForgotPassword.jsx
          src/pages/ResetPassword.jsx
          src/pages/UserLogin.jsx
          src/pages/UserSignup.jsx
          src/pages/GymOwnerLoginSafe.jsx
          src/pages/GymOwnerSignup.jsx
          src/pages/CoreFeatures.jsx
          src/pages/GymBattles.jsx
          src/pages/Challenges.jsx
          src/pages/Leaderboard.jsx
          src/pages/Rewards.jsx

      - name: Build production web app
        run: npm run build
