workflows:
  capacitor-android-apk:
    name: SE7EN FIT Capacitor Android APK
    max_build_duration: 60

    environment:
      node: 20
      java: 21
      vars:
        CI: "1"

    scripts:
      - name: Install dependencies
        script: |
          node --version
          java -version
          npm --version
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build web app
        script: |
          npm run build

      - name: Add Android platform if missing
        script: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/**/mapping.txt
