workflows:
  se7enfit-android-release-apk:
    name: SE7EN FIT Android Release APK
    max_build_duration: 60

    environment:
      node: 20
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - mobile/node_modules

    scripts:
      - name: Install dependencies
        script: |
          cd mobile
          npm ci

      - name: Fix Gradle permission
        script: |
          cd mobile/android
          chmod +x gradlew

      - name: Build standalone release APK
        script: |
          cd mobile/android
          ./gradlew clean :app:assembleRelease --no-daemon --stacktrace

    artifacts:
      - mobile/android/app/build/outputs/apk/release/*.apk